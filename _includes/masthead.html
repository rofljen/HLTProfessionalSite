{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <nav class="navbar">
      <!-- Left button -->
      <a href="{{ base_path }}/" class="nav-button">{{ site.title }}</a>
      
      <!-- Middle navigation links -->
      <div class="nav-links">
        {% for link in site.data.navigation.main %}
          {% if link.url contains 'http' %}
            {% assign domain = '' %}
          {% else %}
            {% assign domain = base_path %}
          {% endif %}
          <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
        {% endfor %}
      </div>
      
      <!-- Right button (if needed) -->
      <a href="#" class="nav-button">Contact</a>
      
      <!-- Mobile menu toggle -->
      <div class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>
  </div>
</div>
