{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <nav class="navbar">
      <!-- Left button -->
      <a href="{{ base_path }}/" class="nav-button">{{ site.title }}</a>
      
      <!-- Navigation links (visible on desktop, hidden on mobile) -->
      <div class="nav-links">
        {% for link in site.data.navigation.main %}
          {% if link.url contains 'http' %}
            <a href="{{ link.url }}">{{ link.title }}</a>
          {% else %}
            <a href="{{ base_path }}{{ link.url }}">{{ link.title }}</a>
          {% endif %}
        {% endfor %}
      </div>
      
      <!-- Mobile menu toggle (hamburger icon) -->
      <div class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>
  </div>
</div>

<!-- Include jQuery and your script files -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{{ base_path }}/assets/js/mobile-menu.js"></script>
